version: '3.8'

services:
  # MySQL Database
  db:
    image: mysql:8.0
    container_name: eyewear_db
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: eyewear_db
      MYSQL_USER: eyewear_user
      MYSQL_PASSWORD: eyewear_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: eyewear_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      timeout: 20s
      retries: 10

  # FastAPI Backend
  backend:
    build: ./backend
    container_name: eyewear_backend
    environment:
      MYSQL_URL: mysql+pymysql://eyewear_user:eyewear_password@db:3306/eyewear_db
      REDIS_URL: redis://redis:6379
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN}
      SENDGRID_API_KEY: ${SENDGRID_API_KEY}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # React/Next.js Frontend
  frontend:
    build: ./frontend
    container_name: eyewear_frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
    command: npm run dev

volumes:
  mysql_data:
  redis_data: